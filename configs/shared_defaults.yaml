dataset:
  backend: local_snapshot_cache
  dataset_root: .cache/ir_datasets/longeval-sci-2026
  snapshot_ids:
    - snapshot-1
    - snapshot-2
    - snapshot-3
  qrels_variant: dctr
  cache_dir: .cache/ir_datasets
  load_fulltext: false

retrieval:
  type: dense
  text_mode: title_abstract
  top_k: 100
  index_root: indexes
  model_name: Qwen/Qwen3-Embedding-4B
  normalize_embeddings: true
  query_prefix: "query: "
  document_prefix: "passage: "
  candidate_k: 100
  lexical_text_mode: full_text
  dense_text_mode: title_abstract
  encode_chunk_size: 2048
  search_chunk_size: 50000
  service_base_url: http://localhost:6543/v1

rerank:
  enabled: false
  model_name: cross-encoder/ms-marco-MiniLM-L-12-v2
  candidate_k: 100
  top_k: 100

temporal:
  enabled: false
  integration_mode: direct
  rerank_top_k: 200
  evaluation_time_field: snapshot
  date_fields:
    - publishedDate
    - createdDate
    - updatedDate
  use_creation_date: false
  use_update_date: false
  use_age: true
  use_recency_decay: true
  use_query_intent: true
  use_lexical_novelty: true
  use_citation_features: false
  citation_network_path: .cache/ir_datasets/longeval-sci-2026/longeval-sci-2026-citation-network.csv
  citation_cache_root: outputs/cache/temporal_citations
  citation_recent_window_days: 180
  exclude_self_citations: true
  query_profile_top_k: 20
  query_profile_temporal_entropy_threshold: 0.55
  query_profile_high_citation_share_threshold: 0.3
  query_profile_high_citation_count_threshold: 10
  query_profile_year_span_threshold: 5
  query_profile_old_doc_window_years: 5
  query_profile_old_doc_share_threshold: 0.5
  query_profile_temporal_alpha_explicit: 0.25
  query_profile_temporal_alpha_concentrated: 0.15
  query_profile_temporal_alpha_default: 0.03
  query_profile_citation_beta_explicit: 0.25
  query_profile_citation_beta_high_share: 0.12
  query_profile_citation_beta_default: 0.03
  overlay_candidate_k: 200
  overlay_relevance_threshold: 0.05
  freshness_half_life_days: 90.0
  age_half_life_days: 365.0
  base_weight: 1.0
  recency_weight: 0.25
  update_weight: 0.2
  foundation_weight: 0.15
  novelty_weight: 0.1
  citation_total_weight: 0.1
  citation_recent_weight: 0.12
  citation_foundation_weight: 0.1
  citation_emerging_weight: 0.12
  citation_outbound_weight: 0.02

output:
  output_root: outputs
  reports_root: outputs/reports

runtime:
  device: cpu
  batch_size: 16
  seed: 42
  pyterrier_memory_mb: 12288

metrics:
  - ndcg_cut_10
  - ndcg_cut_1000
  - map
  - recall_100
  - recall_1000
