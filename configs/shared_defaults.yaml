dataset:
  backend: local_snapshot_cache
  dataset_root: .cache/ir_datasets/longeval-sci-2026
  snapshot_ids:
    - snapshot-1
    - snapshot-2
    - snapshot-3
  qrels_variant: dctr
  cache_dir: .cache/ir_datasets
  load_fulltext: false

retrieval:
  type: dense
  text_mode: title_abstract
  top_k: 100
  index_root: indexes
  model_name: Qwen/Qwen3-Embedding-4B
  normalize_embeddings: true
  query_prefix: "query: "
  document_prefix: "passage: "
  candidate_k: 100
  lexical_text_mode: full_text
  dense_text_mode: title_abstract
  encode_chunk_size: 2048
  search_chunk_size: 50000
  service_base_url: http://localhost:6543/v1

rerank:
  enabled: false
  model_name: cross-encoder/ms-marco-MiniLM-L-12-v2
  candidate_k: 100
  top_k: 100

temporal:
  enabled: false
  rerank_top_k: 200
  evaluation_time_field: snapshot
  date_fields:
    - updatedDate
    - publishedDate
    - createdDate
  use_creation_date: true
  use_update_date: true
  use_age: true
  use_recency_decay: true
  use_query_intent: true
  use_lexical_novelty: true
  freshness_half_life_days: 90.0
  age_half_life_days: 365.0
  base_weight: 1.0
  recency_weight: 0.25
  update_weight: 0.2
  foundation_weight: 0.15
  novelty_weight: 0.1

output:
  output_root: outputs
  reports_root: outputs/reports

runtime:
  device: cpu
  batch_size: 16
  seed: 42
  pyterrier_memory_mb: 12288

metrics:
  - ndcg_cut_10
  - ndcg_cut_1000
  - map
  - recall_100
  - recall_1000
