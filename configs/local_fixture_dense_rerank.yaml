run_name: dense_rerank_fixture
pipeline: dense_rerank

dataset:
  backend: local_files
  dataset_name: tests-fixture/snapshot-1
  snapshot_id: snapshot-1
  qrels_variant: dctr
  corpus_path: tests/fixtures/corpus.jsonl
  queries_path: tests/fixtures/queries.jsonl
  qrels_path: tests/fixtures/qrels.tsv

retrieval:
  type: dense
  model_name: intfloat/e5-base-v2
  text_mode: title_abstract
  top_k: 100
  index_dir: outputs/test_indexes
  normalize_embeddings: true
  query_prefix: "query: "
  document_prefix: "passage: "

rerank:
  enabled: true
  model_name: cross-encoder/ms-marco-MiniLM-L-12-v2
  candidate_k: 100
  top_k: 100

output:
  output_dir: outputs/test_runs

runtime:
  device: cpu
  batch_size: 8
  seed: 42
