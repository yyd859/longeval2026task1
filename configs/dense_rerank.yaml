run_name: dense_rerank
pipeline: dense_rerank

dataset:
  backend: ir_datasets_longeval
  dataset_name: longeval-sci-2026/snapshot-1
  snapshot_id: snapshot-1
  qrels_variant: dctr

retrieval:
  type: dense
  model_name: intfloat/e5-base-v2
  text_mode: title_abstract
  top_k: 100
  index_dir: indexes/dense_rerank
  normalize_embeddings: true
  query_prefix: "query: "
  document_prefix: "passage: "

rerank:
  enabled: true
  model_name: cross-encoder/ms-marco-MiniLM-L-12-v2
  candidate_k: 100
  top_k: 100

output:
  output_dir: outputs/dense_rerank

runtime:
  device: cpu
  batch_size: 16
  seed: 42
